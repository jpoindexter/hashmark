<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Subtle glow for the hash mark -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Radial vignette for depth -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#111827" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
    <!-- Emerald inner glow -->
    <filter id="hash-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" in="SourceGraphic" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.063
                0 0 0 0 0.725
                0 0 0 0 0.506
                0 0 0 1.8 -0.5" result="green-glow"/>
      <feMerge>
        <feMergeNode in="green-glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: deep zinc -->
  <rect width="512" height="512" fill="#09090b"/>

  <!-- Subtle grid lines — terminal feel -->
  <g opacity="0.04" stroke="#10b981" stroke-width="1">
    <line x1="0" y1="64" x2="512" y2="64"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="192" x2="512" y2="192"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="0" y1="448" x2="512" y2="448"/>
    <line x1="64" y1="0" x2="64" y2="512"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="192" y1="0" x2="192" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="448" y1="0" x2="448" y2="512"/>
  </g>

  <!-- Vignette overlay -->
  <rect width="512" height="512" fill="url(#vignette)"/>

  <!-- Hash mark with glow -->
  <g filter="url(#hash-glow)">
    <!-- Vertical bar left -->
    <rect x="162" y="100" width="38" height="312" rx="4" fill="#10b981"/>
    <!-- Vertical bar right -->
    <rect x="312" y="100" width="38" height="312" rx="4" fill="#10b981"/>
    <!-- Horizontal bar top -->
    <rect x="114" y="182" width="284" height="38" rx="4" fill="#10b981"/>
    <!-- Horizontal bar bottom -->
    <rect x="114" y="292" width="284" height="38" rx="4" fill="#10b981"/>
  </g>

  <!-- Thin 1px border — sharp edge -->
  <rect x="0.5" y="0.5" width="511" height="511" fill="none" stroke="#10b981" stroke-width="1" stroke-opacity="0.2"/>
</svg>
